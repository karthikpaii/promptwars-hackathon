<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Stadium Experience</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dark-theme">
    
    <div class="app-layout">
        <!-- Sidebar / Bottom Nav -->
        <nav class="main-nav">
            <div class="nav-brand">
                <i data-lucide="zap"></i>
                <span class="brand-text">StadiumIQ</span>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="#" id="tab-dashboard"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a></li>
                <li><a href="#" id="tab-map"><i data-lucide="map"></i><span>Map View</span></a></li>
                <li><a href="#" id="tab-alerts"><i data-lucide="bell"></i><span>Alerts</span></a></li>
                <li><a href="#" id="tab-settings"><i data-lucide="settings"></i><span>Settings</span></a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="content-area">
            
            <header class="top-header">
                <div class="header-title">
                    <h1 id="page-title">Dashboard</h1>
                    <p class="subtitle">Live Crowd & Gate Management</p>
                </div>
                <div class="header-actions">
                    <div class="status-indicator">
                        <span class="pulsing-dot"></span>
                        <span class="status-text">Live</span>
                    </div>
                </div>
            </header>

            <div class="view-container" id="view-dashboard">
                <!-- KPI Widgets (Will populate dynamically) -->
                <div class="kpi-grid">
                    <div class="kpi-card glass-panel">
                        <div class="kpi-icon"><i data-lucide="users"></i></div>
                        <div class="kpi-details">
                            <h3>Total Occupancy</h3>
                            <div class="kpi-value" id="kpi-occupancy">--</div>
                        </div>
                    </div>
                    <div class="kpi-card glass-panel">
                        <div class="kpi-icon"><i data-lucide="clock"></i></div>
                        <div class="kpi-details">
                            <h3>Avg Wait Time</h3>
                            <div class="kpi-value" id="kpi-wait">--</div>
                        </div>
                    </div>
                    <div class="kpi-card glass-panel">
                        <div class="kpi-icon warning"><i data-lucide="alert-triangle"></i></div>
                        <div class="kpi-details">
                            <h3>Congested Areas</h3>
                            <div class="kpi-value" id="kpi-congestion">--</div>
                        </div>
                    </div>
                </div>

                <!-- Charts Section -->
                <div class="dashboard-grid">
                    <div class="dashboard-panel glass-panel large">
                        <h2>Gate Waiting Times (Live)</h2>
                        <div class="chart-container">
                            <canvas id="gateWaitChart"></canvas>
                        </div>
                    </div>
                    <div class="dashboard-panel glass-panel">
                        <h2>Zone Crowd Density</h2>
                        <div class="chart-container">
                            <canvas id="zoneDensityChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="view-container hidden" id="view-map">
                <div class="map-wrapper glass-panel">
                    <div id="stadium-map"></div>
                </div>
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom Scripts -->
    <script src="/static/js/map.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        // Init Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
